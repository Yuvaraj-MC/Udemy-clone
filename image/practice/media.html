<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        body {
            background-color: #2C26AE;
        }

        .container {
            padding: 20px;
        }

        .hello {
            background-color: white;
            padding: 15px;
            width: 500px;
            font-size: 35px;
        }

        /* For mobile screens (600px and below) */
        @media screen and (max-width: 600px) {

            .container {
                padding: 10px;
            }

            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 16px;
            }

            .hello {
                width: 100%;
                /* full width for small screen */
                font-size: 18px;
                /* reduce text size */
                padding: 10px;
            }
        }
    </Style>
</head>

<body>
    <div class="container">
        <h1>EXERCISE</h1>
        <h2>ON DESKTOP</h2>
        <h1 class="hello">Hi, Hello how are you</h1>
    </div>

</body>

</html>
